# OpenFactory Device Configuration File
# To be used in the Dev Container of this repo

devices:
  vtempsens1:
    uuid: OPCUA-SENSOR-001

    connector:
      type: opcua

      server:
        uri: opc.tcp://${CONTAINER_IP}:4840/freeopcuas/server/

      variables:
        temp:
          node_id: ns=2;i=4
          tag: Temperature
        hum:
          node_id: ns=2;i=5
          tag: Humidity
        sensor_model: 
          node_id: ns=2;i=3
          tag: SensorModel

      events:
        sensor_events:
          node_id: ns=2;i=2

  vtempsens2:
    uuid: OPCUA-SENSOR-002

    connector:
      type: opcua

      server:
        uri: opc.tcp://${CONTAINER_IP}:4840/freeopcuas/server/

      variables:
        temp:
          node_id: ns=2;i=10
          tag: Temperature
        hum:
          node_id: ns=2;i=11
          tag: Humidity
        sensor_model: 
          node_id: ns=2;i=9
          tag: SensorModel

      events:
        sensor_events:
          node_id: ns=2;i=8
